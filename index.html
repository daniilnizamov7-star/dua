<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Дуа • Даниил</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080c18;
      --card:     #0f1628;
      --card2:    #141c35;
      --border:   rgba(255,255,255,0.07);
      --accent:   #34d399;
      --accent2:  #6ee7b7;
      --gold:     #f59e0b;
      --gold2:    #fcd34d;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --muted2:   #64748b;
      --danger:   #f87171;
      --purple:   #a78bfa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ШАПКА ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,24,0.92);
      backdrop-filter: blur(16px);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem;
    }
    .header-title { font-size: 1.1rem; font-weight: 900; color: var(--text); flex: 1; }
    .header-sub { font-size: 0.72rem; color: var(--muted); }
    .progress-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring .track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 3; }
    .progress-ring .fill { fill: none; stroke: var(--accent); stroke-width: 3;
      stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
    .progress-ring .label { position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: var(--accent); }

    /* ── ТАБЫ ── */
    .tabs {
      display: flex; gap: 0; padding: 0.75rem 1rem 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .tab {
      flex: 1; padding: 0.6rem 0.5rem; text-align: center;
      font-size: 0.78rem; font-weight: 700; color: var(--muted2);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; border-radius: 0;
      background: none; border-left: none; border-right: none; border-top: none;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── КОНТЕНТ ── */
    .content { padding: 1rem; padding-bottom: 6rem; }

    /* ── ДУА КАРТОЧКА ── */
    .dua-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      margin-bottom: 0.875rem;
      overflow: hidden;
      transition: all 0.3s;
      position: relative;
    }
    .dua-card.done {
      border-color: rgba(52,211,153,0.3);
      background: linear-gradient(135deg, rgba(52,211,153,0.05), var(--card));
    }
    .dua-card.done::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .dua-header {
      padding: 0.875rem 1rem 0.5rem;
      display: flex; align-items: flex-start; gap: 0.6rem;
    }
    .dua-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 900; color: var(--accent);
      flex-shrink: 0; margin-top: 1px;
    }
    .dua-card.done .dua-num { background: var(--accent); color: #0f172a; border-color: var(--accent); }
    .dua-title { font-size: 0.82rem; font-weight: 800; color: var(--text); line-height: 1.3; flex: 1; }
    .dua-badge {
      font-size: 0.6rem; font-weight: 700; padding: 0.15rem 0.4rem;
      border-radius: 0.4rem; flex-shrink: 0;
    }
    .badge-sunnah { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }
    .badge-personal { background: rgba(167,139,250,0.15); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
    .badge-morning { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
    .badge-evening { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }

    /* Арабский текст */
    .dua-arabic {
      font-family: 'Amiri', serif;
      font-size: 1.35rem;
      line-height: 2;
      direction: rtl;
      text-align: right;
      color: var(--accent2);
      padding: 0.5rem 1rem 0.25rem;
      border-top: 1px solid var(--border);
    }

    /* Транслитерация */
    .dua-translit {
      font-size: 0.8rem; color: var(--muted);
      padding: 0.25rem 1rem;
      font-style: italic; line-height: 1.6;
    }

    /* Перевод */
    .dua-translation {
      font-size: 0.85rem; color: var(--text);
      padding: 0.25rem 1rem 0.75rem;
      line-height: 1.6;
    }

    /* Источник */
    .dua-source {
      font-size: 0.68rem; color: var(--gold);
      padding: 0 1rem 0.5rem;
      font-weight: 700;
    }

    /* Кнопка счётчика */
    .dua-counter {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem 0.875rem;
    }
    .counter-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(52,211,153,0.1); border: 1.5px solid rgba(52,211,153,0.3);
      color: var(--accent); font-size: 1.1rem; font-weight: 900;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .counter-btn:active { transform: scale(0.9); background: rgba(52,211,153,0.2); }
    .counter-display {
      font-size: 1rem; font-weight: 800; color: var(--text);
      min-width: 2rem; text-align: center;
    }
    .counter-target { font-size: 0.72rem; color: var(--muted); flex: 1; }
    .counter-dots {
      display: flex; gap: 0.3rem; flex-wrap: wrap;
    }
    .counter-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.2s;
    }
    .counter-dot.filled { background: var(--accent); border-color: var(--accent); }

    /* Кнопка принять */
    .dua-done-btn {
      width: calc(100% - 2rem); margin: 0 1rem 0.875rem;
      padding: 0.65rem; border-radius: 0.875rem;
      border: 1.5px solid rgba(52,211,153,0.3);
      background: transparent; color: var(--accent);
      font-size: 0.85rem; font-weight: 800;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      transition: all 0.2s;
    }
    .dua-done-btn.done {
      background: var(--accent); color: #0f172a;
      border-color: var(--accent);
    }
    .dua-done-btn:active { transform: scale(0.98); }

    /* ── СЕКЦИЯ ЗАГОЛОВОК ── */
    .section-label {
      font-size: 0.65rem; font-weight: 900; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted2);
      padding: 0.25rem 0 0.75rem; margin-top: 0.25rem;
    }

    /* ── ИТОГО БЛОК ── */
    .summary-card {
      background: linear-gradient(135deg, rgba(52,211,153,0.1), rgba(52,211,153,0.03));
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 1.25rem; padding: 1.25rem;
      margin-bottom: 1rem; text-align: center;
    }
    .summary-title { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .summary-count { font-size: 2.5rem; font-weight: 900; color: var(--accent); line-height: 1; }
    .summary-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .summary-arabic {
      font-family: 'Amiri', serif; font-size: 1rem;
      color: var(--accent2); margin-top: 0.75rem;
      direction: rtl; line-height: 1.8;
    }

    /* ── СБРОС КНОПКА ── */
    .reset-btn {
      width: 100%; padding: 0.75rem;
      border-radius: 1rem; border: 1px solid var(--border);
      background: transparent; color: var(--muted2);
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      font-family: 'Nunito', sans-serif; margin-top: 0.5rem;
      transition: all 0.2s;
    }
    .reset-btn:active { background: rgba(255,255,255,0.05); }

    /* ── НИЖНЯЯ НАВИГАЦИЯ ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(8,12,24,0.95); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom));
      display: flex; gap: 0.5rem;
    }
    .bottom-btn {
      flex: 1; padding: 0.65rem; border-radius: 0.875rem;
      border: 1px solid var(--border); background: var(--card);
      color: var(--muted); font-size: 0.78rem; font-weight: 700;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      transition: all 0.2s;
    }
    .bottom-btn.primary {
      background: var(--accent); color: #0f172a;
      border-color: var(--accent); font-size: 0.85rem;
    }
    .bottom-btn:active { transform: scale(0.97); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid var(--accent);
      border-radius: 2rem; padding: 0.5rem 1.25rem;
      font-size: 0.82rem; font-weight: 700; color: var(--text);
      white-space: nowrap; z-index: 999;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ── АНИМАЦИИ ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dua-card { animation: fadeIn 0.3s ease both; }

    /* Прогресс бар */
    .progress-bar-wrap {
      height: 3px; background: rgba(255,255,255,0.06);
      margin: 0 1rem; border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.4s ease;
    }
  </style>
</head>
<body>

<!-- ШАПКА -->
<div class="header">
  <div style="flex:1">
    <div class="header-title">🤲 Дуа</div>
    <div class="header-sub" id="header-sub">Загрузка...</div>
  </div>
  <div class="progress-ring">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle class="track" cx="22" cy="22" r="18"/>

        stroke-dasharray="113" stroke-dashoffset="113"/>
    </svg>

  </div>
</div>

<!-- ТАБЫ -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('sunnah')" id="tab-sunnah">🕌 После намаза</button>
  <button class="tab" onclick="switchTab('personal')" id="tab-personal">💚 Личные дуа</button>
  <button class="tab" onclick="switchTab('daily')" id="tab-daily">☀️ Утро/Вечер</button>
</div>

<!-- КОНТЕНТ -->
<div class="content" id="content"></div>

<!-- ТОСТ -->
<div class="toast" id="toast"></div>

<!-- НИЖНЯЯ ПАНЕЛЬ -->
<div class="bottom-bar">
  <button class="bottom-btn" onclick="resetDay()">🔄 Сброс</button>
  <button class="bottom-btn primary" onclick="markAllDone()">✅ Всё прочитано</button>
</div>

// ── СОСТОЯНИЕ ──
let state = {};
let currentTab = 'sunnah';

const getKey = () => {
  const d = new Date();
  return `dua_state_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
};

const loadState = () => {
  try {
    const s = localStorage.getItem(getKey());
    state = s ? JSON.parse(s) : {};
  } catch(e) { state = {}; }
};

const saveState = () => {
  try { localStorage.setItem(getKey(), JSON.stringify(state)); } catch(e) {}
};

// ── РЕНДЕР ──
const getBadgeHtml = (dua) => {
  const badgeMap = {
    morning: ['badge-morning', '🌅 Утро'],
    evening: ['badge-evening', '🌙 Вечер'],
    sunnah:  ['badge-sunnah', '⭐ Сунна'],
    personal: ['badge-personal', '💚 Личное']
  };
  const key = dua.badge || currentTab;
  const [cls, label] = badgeMap[key] || badgeMap.sunnah;
  return `<span class="dua-badge ${cls}">${label}</span>`;
};

const renderCounter = (dua) => {
  const cur = state[dua.id + '_count'] || 0;
  const target = dua.count;
  const done = cur >= target;
  const dots = Array.from({length: Math.min(target, 10)}, (_, i) =>
    `<div class="counter-dot ${i < Math.min(cur, 10) ? 'filled' : ''}"></div>`
  ).join('');

  return `
    <div class="dua-counter">
      <button class="counter-btn" onclick="tapCounter('${dua.id}', ${target})" ${done ? 'disabled style="opacity:0.4"' : ''}>
        ${done ? '✓' : '+'}
      </button>
      <div class="counter-display">${cur}</div>
      <div class="counter-target">/ ${target} ${done ? '✅' : ''}</div>
      ${target <= 10 ? `<div class="counter-dots">${dots}</div>` : ''}
    </div>
    ${dua.note ? `<div style="font-size:0.72rem;color:var(--muted);padding:0 1rem 0.75rem;line-height:1.6;font-style:italic;">💡 ${dua.note}</div>` : ''}
  `;
};

const renderCard = (dua, idx) => {
  const isDone = dua.type === 'counter'
    ? (state[dua.id + '_count'] || 0) >= dua.count
    : !!state[dua.id];

  if (dua.isPersonalNote) {
    return `
      <div class="dua-card ${isDone ? 'done' : ''}" id="card-${dua.id}" style="animation-delay:${idx * 0.04}s">
        <div class="dua-header">
          <div class="dua-num">${isDone ? '✓' : idx + 1}</div>
          <div class="dua-title">💭 ${dua.title}</div>
        </div>
        <div class="dua-translation">«${dua.translation}»</div>
        <div class="dua-source" style="color:var(--muted);font-style:italic">⚠️ ${dua.note}</div>
        <button class="dua-done-btn ${isDone ? 'done' : ''}" onclick="toggleDone('${dua.id}')">
          ${isDone ? '✓ Прочитано' : '🤲 Прочитал'}
        </button>
      </div>
    `;
  }

  return `
    <div class="dua-card ${isDone ? 'done' : ''}" id="card-${dua.id}" style="animation-delay:${idx * 0.04}s">
      <div class="dua-header">
        <div class="dua-num">${isDone ? '✓' : idx + 1}</div>
        <div class="dua-title">${dua.title}</div>
        ${getBadgeHtml(dua)}
      </div>
      <div class="dua-arabic">${dua.arabic}</div>
      <div class="dua-translit">${dua.translit}</div>
      <div class="dua-translation">«${dua.translation}»</div>
      <div class="dua-source">${dua.source}</div>
      ${dua.type === 'counter' ? renderCounter(dua) : `
        <button class="dua-done-btn ${isDone ? 'done' : ''}" onclick="toggleDone('${dua.id}')">
          ${isDone ? '✓ Прочитано' : '🤲 Прочитал'}
        </button>
      `}
    </div>
  `;
};

const renderContent = () => {
  const list = DUA_DATA[currentTab];
  const content = document.getElementById('content');

  let html = '';

  if (currentTab === 'sunnah') {
    html += `<div class="section-label">Обязательный минимум после каждого намаза</div>`;
  } else if (currentTab === 'personal') {
    html += `<div class="section-label">Личные дуа — читай после Сунны</div>`;
  } else {
    const morning = list.filter(d => d.badge === 'morning');
    const evening = list.filter(d => d.badge === 'evening');

    html += `<div class="section-label">🌅 Утренние азкары</div>`;
    html += morning.map((d, i) => renderCard(d, i)).join('');
    html += `<div class="section-label" style="margin-top:0.5rem">🌙 Вечерние азкары</div>`;
    html += evening.map((d, i) => renderCard(d, i)).join('');

    content.innerHTML = html;
    updateProgress();
    return;
  }

  html += list.map((d, i) => renderCard(d, i)).join('');

  // Итого блок
  const done = list.filter(d =>
    d.type === 'counter' ? (state[d.id + '_count'] || 0) >= d.count : !!state[d.id]
  ).length;

  if (done === list.length && done > 0) {
    html += `
      <div class="summary-card">
        <div class="summary-title">Машааллах!</div>
        <div class="summary-count">✅</div>
        <div class="summary-sub">Все дуа прочитаны</div>
        <div class="summary-arabic">رَبَّنَا تَقَبَّلْ مِنَّا</div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.25rem">Господь наш, прими от нас</div>
      </div>
    `;
  }

  content.innerHTML = html;
  updateProgress();
};

// ── ПРОГРЕСС ──
const updateProgress = () => {
  const all = [...DUA_DATA.sunnah, ...DUA_DATA.personal, ...DUA_DATA.daily];
  const total = all.length;
  const done = all.filter(d =>
    d.type === 'counter' ? (state[d.id + '_count'] || 0) >= d.count : !!state[d.id]
  ).length;

  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const circumference = 113;
  const offset = circumference - (pct / 100 * circumference);

  document.getElementById('progress-circle').style.strokeDashoffset = offset;
  document.getElementById('progress-label').textContent = pct + '%';
  document.getElementById('header-sub').textContent = `${done} из ${total} прочитано`;
};

// ── ДЕЙСТВИЯ ──
window.toggleDone = (id) => {
  state[id] = !state[id];
  if (state[id] && navigator.vibrate) navigator.vibrate([30, 15, 30]);
  saveState();
  renderContent();
};

window.tapCounter = (id, target) => {
  const cur = state[id + '_count'] || 0;
  if (cur >= target) return;
  state[id + '_count'] = cur + 1;
  if (state[id + '_count'] >= target && navigator.vibrate) navigator.vibrate([40, 20, 40]);
  saveState();
  renderContent();
};

window.switchTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderContent();
};

window.markAllDone = () => {
  const list = DUA_DATA[currentTab];
  list.forEach(d => {
    if (d.type === 'counter') state[d.id + '_count'] = d.count;
    else state[d.id] = true;
  });
  saveState();
  renderContent();
  showToast('✅ Машааллах, TabarakAllah!');
};

window.resetDay = () => {
  if (!confirm('Сбросить прогресс сегодняшнего дня?')) return;
  state = {};
  saveState();
  renderContent();
  showToast('🔄 Прогресс сброшен');
};

const showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

// ── INIT ──
loadState();
renderContent();

      // APP_VERSION — поднимать при каждом деплое
      const APP_VERSION = 'v1';

      // SW регистрация
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      }

      // Автообновление при новой версии
      const checkVersion = async () => {
        try {
          const res = await fetch('/index.html', { cache: 'no-store' });
          const html = await res.text();
          const match = html.match(/APP_VERSION = '([^']+)'/);
          if (match && match[1] !== APP_VERSION) window.location.reload();
        } catch(e) {}
      };
      checkVersion();
      setInterval(checkVersion, 5 * 60 * 1000);
</script>
